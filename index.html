<!DOCTYPE HTML>
<html>

<head>
    <title>Mr.Luo - LuoV的个人主页</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icon/favicon-16x16.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/main.css" />

    <style>
        /* --- 1. 背景层：负责图片显示和滚动 --- */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            /* 请确保路径下有你的背景图片 */
            background-image: url('assets/css/images/bga.webp');
            /* 水平重复，实现首尾相连 */
            background-repeat: repeat-x; 
            /* 高度撑满，宽度自动 */
            background-size: auto 100%; 
            background-position: 0 center;
            /* 应用滚动动画：60秒循环一次 */
            animation: bg-scroll 60s linear infinite;
        }

        /* 背景滚动动画定义 */
        @keyframes bg-scroll {
            0% { background-position-x: 0; }
            /* 假设图片宽度约1920px，负值向左移动实现循环 */
            100% { background-position-x: -1920px; } 
        }

        /* --- 2. 遮罩层(Overlay)：核心科技光棱效果 --- */
        /* --- 方案二：数字电路 (Cyber Circuit) --- */
        #overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;

            /* 深色基调 */
            background-color: rgba(15, 25, 40, 0.7);

            /* 复杂的几何渐变组合 */
            background-image: 
                /* 暗角 */
                radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.9) 100%),
                
                /* 45度斜线网格 1 */
                linear-gradient(45deg, rgba(0, 247, 255, 0.05) 25%, transparent 25%, transparent 75%, rgba(0, 247, 255, 0.05) 75%, rgba(0, 247, 255, 0.05)), 
                
                /* 45度斜线网格 2 (错位) */
                linear-gradient(45deg, rgba(0, 247, 255, 0.05) 25%, transparent 25%, transparent 75%, rgba(0, 247, 255, 0.05) 75%, rgba(0, 247, 255, 0.05));

            /* 错位设置，产生电路板/编织效果 */
            background-position: 0 0, 0 0, 110px 110px;
            background-size: 100% 100%, 110px 110px, 110px 110px;

            /* 混合模式 */
            mix-blend-mode: screen;
            pointer-events: none;
        }

        /* --- 3. 内容层与文字增强 --- */
        #main {
            position: relative;
            z-index: 3;
        }
        
        /* 为了配合复杂的科技背景，增强文字的亮度和阴影，确保清晰可读 */
        #header h1 {
            text-shadow: 0 2px 10px rgba(0, 247, 255, 0.3); /* 增加一点青色辉光 */
        }
        #header p, #hitokoto_text {
            color: rgba(255, 255, 255, 0.9) !important;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* 4. 防止白屏强制显示 */
        body {
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* --- 5. 首页增强：身份行 / 研究方向 / 最新动态 --- */
        #header #home-tagline {
            margin: 8px 0 0;
            font-size: 0.92em;
            letter-spacing: 1px;
            color: rgba(0, 247, 255, 0.85) !important;
            text-shadow: 0 1px 6px rgba(0, 247, 255, 0.25);
        }

        /* 一言前缀：标明「随感」性质，避免与头衔混淆；做成小标签提升可读性，并居中 */
        #header .hitokoto-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #d6f9ff;
            background: rgba(0, 247, 255, 0.14);
            border: 1px solid rgba(0, 247, 255, 0.5);
            border-radius: 6px;
            padding: 3px 7px;
            margin-right: 8px;
            font-size: 0.74em;
            letter-spacing: 2px;
            line-height: 1;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45);
            vertical-align: middle;
        }

        #header #home-interests {
            margin: 12px auto 2px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 480px;
        }
        #header #home-interests .chip {
            font-size: 0.76em;
            padding: 3px 12px;
            border: 1px solid rgba(0, 247, 255, 0.35);
            border-radius: 999px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 247, 255, 0.06);
        }

        #header #home-news {
            margin: 14px auto 0;
            max-width: 500px;
            text-align: left;
            background: rgba(8, 14, 24, 0.55);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 247, 255, 0.2);
            border-radius: 14px;
            padding: 12px 16px;
        }
        #header #home-news .news-title {
            font-size: 0.84em;
            letter-spacing: 3px;
            color: rgba(0, 247, 255, 0.85);
            margin-bottom: 8px;
            text-align: center;
        }
        #header #home-news .news-item {
            display: flex;
            gap: 10px;
            align-items: baseline;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        #header #home-news .news-date {
            flex: 0 0 auto;
            color: rgba(0, 247, 255, 0.9);
            font-variant-numeric: tabular-nums;
            font-size: 0.95em;
        }
        #header #home-news .news-text {
            flex: 1 1 auto;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        #header #home-news .news-text strong { color: #fff; font-weight: 500; }
        #header #home-news .news-text em {
            font-style: normal;
            color: rgba(0, 247, 255, 0.9);
        }
        #header #home-news .news-more {
            margin-left: auto;
            padding-left: 12px;
            white-space: nowrap;
            align-self: center;
            font-size: 0.82em;
            color: rgba(0, 247, 255, 0.85);
            text-decoration: none !important;
            border-bottom: none !important;
            transition: color 0.3s;
        }
        #header #home-news .news-more:hover { color: #fff; }

        /* 宽屏：加宽最新动态面板（左右各约一个图标宽度），并稍微放大字号，避免浪费空间 */
        @media (min-width: 641px) {
            #header #home-news {
                max-width: 640px;
                padding: 14px 20px;
            }
            #header #home-news .news-title { font-size: 0.9em; }
            #header #home-news .news-item { font-size: 0.96em; }
            #header #home-news .news-date { font-size: 1em; }
            #header #home-news .news-more { font-size: 0.88em; }
        }

        /* 移动端：flex 纵向布局，footer 在页面内容底部，内容少时自然铺满窗口 */
        @media (max-width: 480px) {
            #main {
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding-top: 0;
            }
            #main:before { display: none; }

            #header {
                flex: 1 0 auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 100%;
                padding: 8vh 1em 0;
                top: 0;
                vertical-align: top;
            }

            #footer {
                flex: 0 0 auto;
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 0;
                padding: 1em 0;
                animation: none;
                transform: translateY(0);
            }

            #header #home-news {
                width: 100%;
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }
            #header #home-news .news-title { font-size: 0.85em; }
            #header #home-news .news-item { font-size: 0.95em; }
            #header #home-news .news-date { font-size: 0.95em; }
            #header #home-news .news-more { font-size: 0.85em; }

            /* 移动端：隐藏研究方向标签，避免挤占空间 */
            #home-interests { display: none; }

            /* 移动端：随感标签竖排，避免占横向宽度 */
            #home-hitokoto {
                display: flex;
                align-items: flex-start;
                justify-content: center;
                gap: 6px;
            }
            #header .hitokoto-label {
                writing-mode: vertical-rl;
                letter-spacing: 0;
                padding: 4px 3px;
                margin-top: 1px;
                margin-right: 0;
                align-items: center;
                justify-content: center;
            }
        }
    </style>

<body>
    <div id="wrapper">
        <div id="bg"></div>
        <div id="overlay"></div>
        
        <div id="main">

            <header id="header">
                <h1>LuoV</h1>
                <div id="home-tagline"></div>
                <div id="home-interests"></div>
                <p id="home-hitokoto" style="font-family: 'Kaiti', 'KaiTi', serif; margin-top: 10px; font-size: 1.1em;">
                    <span class="hitokoto-label">随感</span><a href="#" id="hitokoto_text" style="text-decoration: none; color: inherit; border-bottom: none; transition: color 0.3s;">

                <nav>

    <script>
        // 1. 更新年份
        document.getElementById('year').innerText = new Date().getFullYear();

        // 2. 防止移动端拖拽影响体验（仅在宽屏单屏设计下禁用滚动；移动端允许滚动以容纳更多内容）
        if (window.innerWidth > 480) {
            window.ontouchmove = function() { return false; };
        }
        window.onorientationchange = function() { document.body.scrollTop = 0; }
    </script>

    <script>
        fetch('https://v1.hitokoto.cn')
            .then(function(response) { return response.json(); })
            .then(function(data) {
                var hitokoto = document.getElementById('hitokoto_text');
                if (hitokoto) {
                    hitokoto.href = 'https://hitokoto.cn/?uuid=' + data.uuid;
                    hitokoto.innerText = data.hitokoto;
                }
            })
            .catch(function(err) {
                console.error('一言获取失败:', err);
                document.getElementById('hitokoto_text').innerText = "Eternal charm, Endless sound.";
            });
    </script>

    <!-- 复用简历数据驱动首页身份行 / 研究方向 / 最新动态 -->
    <script src="resume/static/js/data.js"></script>
    <script>
    (function () {
        if (typeof resumeData === 'undefined') return;
        var d = resumeData;
        var lang = 'cn';

        // 1. 身份行：姓名 + 身份
        var tagline = document.getElementById('home-tagline');
        if (tagline && d.info) {
            tagline.textContent = d.info.name.cn + ' · ' + d.info.title.cn;
        }

        // 2. 研究方向 chips（取自博士阶段 focus）
        var chipsBox = document.getElementById('home-interests');
        if (chipsBox && d.education) {
            var phd = d.education.find(function (e) {
                return (e.degree && e.degree.cn || '').indexOf('博士') >= 0;
            });
            var focus = phd && phd.focus ? phd.focus.cn : (d.info.bio.cn || '');
            var parts = focus.split(/[，,、]/).map(function (s) { return s.trim(); })
                .filter(Boolean).slice(0, 4);
            chipsBox.innerHTML = parts.map(function (p) {
                return '<span class="chip">' + p + '</span>';
            }).join('');
        }

        // 3. 最新动态（复用 render.js 合成逻辑，取最新 3 条）
        var newsList = [];
        var now = new Date();
        var monthLimit = 13;
        function checkRecent(dateStr) {
            if (!dateStr) return false;
            var p = dateStr.split('.');
            var y = parseInt(p[0], 10), m = parseInt(p[1], 10) - 1;
            var itemDate = new Date(y, m, 1);
            var diff = (now.getFullYear() - itemDate.getFullYear()) * 12 +
                (now.getMonth() - itemDate.getMonth());
            return diff >= 0 && diff <= monthLimit;
        }
        function shouldShow(item) { return !item.displayIn || item.displayIn[lang]; }
        function fmt(dateStr) {
            var p = dateStr.split('.');
            return p.length >= 2 ? p[0] + '.' + p[1] : dateStr;
        }

        (d.publications || []).forEach(function (pub) {
            if (checkRecent(pub.year) && shouldShow(pub)) {
                var title = (lang === 'cn' && pub.title_cn) ? pub.title_cn : pub.title;
                var venue = lang === 'cn' ? (pub.venue.cn || pub.venue.en)
                    : (pub.venue.en || pub.venue.cn);
                newsList.push({
                    date: pub.year,
                    html: '论文 “<strong>' + title + '</strong>” 被 <em>' + venue + '</em> 录用。'
                });
            }
        });
        (d.awards || []).forEach(function (a) {
            if (checkRecent(a.year) && shouldShow(a)) {
                newsList.push({
                    date: a.year,
                    html: '获得 ' + (a.name.cn || a.name.en || '') + '。'
                });
            }
        });

        newsList.sort(function (a, b) { return b.date.localeCompare(a.date); });
        newsList = newsList.slice(0, 3);

        var box = document.getElementById('home-news');
        if (box) {
            if (newsList.length) {
                box.innerHTML =
                    '<div class="news-title"><i class="icon solid fa-newspaper"></i> 最 新 动 态</div>' +
                    newsList.map(function (n, i) {
                        var more = (i === newsList.length - 1)
                            ? '<a class="news-more" href="resume">简历 →</a>' : '';
                        return '<div class="news-item"><span class="news-date">' + fmt(n.date) +
                            '</span><span class="news-text">' + n.html + '</span>' + more + '</div>';
                    }).join('');
            } else {
                box.style.display = 'none';
            }
        }
    })();
    </script>
</body>
